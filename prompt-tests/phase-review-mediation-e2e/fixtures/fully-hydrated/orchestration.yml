version: "1.0"

# Fixture-local orchestration.yml for the fully-hydrated UI showcase fixture.
# Kept minimal: only the fields that matter for UI discovery. The fully-hydrated
# fixture is NOT runner-driven — its state.json is pre-cooked end-to-end, so
# no pipeline.js invocations read this config. It exists to (a) make the
# fixture folder structurally uniform with the runner-driven
# colors-greet-mismatch fixture, (b) set auto_commit / auto_pr defaults that
# match what the pre-cooked state.json was authored against.

system:
  orch_root: ".claude"

projects:
  base_path: "."
  naming: "SCREAMING_CASE"

default_template: "default"

limits:
  max_phases: 10
  max_tasks_per_phase: 8
  max_retries_per_task: 5
  max_consecutive_review_rejections: 3

human_gates:
  after_planning: true
  execution_mode: "autonomous"
  after_final_review: true

source_control:
  auto_commit: "never"
  auto_pr: "never"
  provider: "github"
