version: "1.0"

# Fixture-local orchestration.yml for the broken-colors harness.
# Kept minimal: only the fields that matter for the corrective-mediation cycle.
# The runner must pass `--config <path-to-this-file>` on every pipeline call
# so the walker sees auto_commit: never (which routes commit_gate to the
# false branch; the fixture uses no real commits).

system:
  orch_root: ".claude"

projects:
  base_path: "."
  naming: "SCREAMING_CASE"

default_template: "default"

limits:
  max_phases: 10
  max_tasks_per_phase: 8
  max_retries_per_task: 5
  max_consecutive_review_rejections: 3

human_gates:
  after_planning: true
  execution_mode: "autonomous"
  after_final_review: true

source_control:
  auto_commit: "never"
  auto_pr: "never"
  provider: "github"
