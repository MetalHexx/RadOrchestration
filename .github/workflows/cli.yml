# .github/workflows/cli.yml — Typecheck, lint, and test the cli/ package on every PR.
name: CLI

on:
  pull_request:
    paths:
      - 'cli/**'
      - '.github/workflows/cli.yml'
  push:
    branches: [main]
    paths:
      - 'cli/**'
      - '.github/workflows/cli.yml'

jobs:
  cli:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Lint (ESLint flat config)
        run: npx eslint .

      # The Vitest suite includes tests/integration/plugin-bundle.test.ts,
      # whose beforeAll invokes `npm run build:plugin` when the plugin tree is
      # absent (always true on clean CI). That meta-script bundles ui/ and
      # skills/rad-orchestration/scripts/, both of which need their own deps.
      # Mirror the install ordering from publish.yml's `publish-plugin` job.
      - name: Install ui dependencies (for build:plugin in plugin-bundle integration test)
        working-directory: ui
        run: npm ci

      - name: Install pipeline scripts dependencies (for build:plugin in plugin-bundle integration test)
        working-directory: skills/rad-orchestration/scripts
        run: npm install

      - name: Test (Vitest full suite)
        run: npx vitest run
