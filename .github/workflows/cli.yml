# .github/workflows/cli.yml — Typecheck, lint, and test the cli/ package on every PR.
name: CLI

on:
  pull_request:
    paths:
      - 'cli/**'
      - 'lib/repo-registry/**'
      - '.github/workflows/cli.yml'
  push:
    branches: [main]
    paths:
      - 'cli/**'
      - 'lib/repo-registry/**'
      - '.github/workflows/cli.yml'

jobs:
  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (root workspace)
        run: npm install

      - name: Typecheck (tsc --noEmit)
        working-directory: cli
        run: npx tsc --noEmit

      - name: Lint (ESLint flat config)
        working-directory: cli
        run: npx eslint .

      - name: Test (Vitest full suite)
        working-directory: cli
        run: npx vitest run
