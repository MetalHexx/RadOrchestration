# .github/workflows/cli.yml — Typecheck, lint, and test the cli/ package on every PR.
name: CLI

on:
  pull_request:
    paths:
      - 'cli/**'
      - '.github/workflows/cli.yml'
  push:
    branches: [main]
    paths:
      - 'cli/**'
      - '.github/workflows/cli.yml'

jobs:
  cli:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # cli/tsconfig.json includes ../harness-files/skills/rad-orchestration/scripts/lib/**/*.ts
      # (the gate subcommands import engine/state-io/types from there). Under
      # moduleResolution: NodeNext, tsc resolves bare imports from each file's
      # own directory, so it needs harness-files/skills/rad-orchestration/scripts/node_modules/
      # to exist before `tsc --noEmit` runs — cli/node_modules/ is not visible
      # from that location. Do not reorder below the Typecheck step.
      - name: Install pipeline scripts dependencies (required by tsc cross-package include)
        working-directory: harness-files/skills/rad-orchestration/scripts
        run: npm install

      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Lint (ESLint flat config)
        run: npx eslint .

      - name: Test (Vitest full suite)
        run: npx vitest run
