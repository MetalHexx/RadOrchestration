# .github/workflows/cli.yml — Typecheck, lint, and test the cli/ package on every PR.
name: CLI

on:
  pull_request:
    paths:
      - 'cli/**'
      - '.github/workflows/cli.yml'
  push:
    branches: [main]
    paths:
      - 'cli/**'
      - '.github/workflows/cli.yml'

jobs:
  cli:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # cli/tsconfig.json includes ../lib/repo-registry/src/**; its `js-yaml`
      # import resolves against lib/repo-registry/node_modules, so the lib's
      # deps must be installed for `tsc --noEmit` to type-resolve them.
      - name: Install repo-registry deps (cli typecheck includes lib sources)
        working-directory: lib/repo-registry
        run: npm ci

      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit

      - name: Lint (ESLint flat config)
        run: npx eslint .

      - name: Test (Vitest full suite)
        run: npx vitest run
