# .github/workflows/ci.yml — Run every adapter + integration tests on every PR.

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  repo-registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies (root workspace)
        run: npm install

      - name: Build lib/repo-registry
        run: npm run build -w @rad-orchestration/repo-registry

      - name: Test lib/repo-registry
        run: npm test -w @rad-orchestration/repo-registry

      - name: Root workspace guard tests (by-name resolution, workspace linkage, CI wiring)
        run: node --test tests/*.test.mjs

      - name: Build-helper structural tests (tests/)
        run: node --test harness-installers/shared/build-helpers/tests/*.test.mjs

      - name: Build-helper structural tests (__tests__/)
        run: node --test harness-installers/shared/build-helpers/__tests__/*.test.mjs

      - name: UI smoke route test (library resolves by-name inside Next app server)
        working-directory: ui
        run: node --test --import tsx "app/api/registry-smoke/route.test.ts"

  work-graph:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies (root workspace)
        run: npm install

      - name: Build lib/work-graph
        run: npm run build -w @rad-orchestration/work-graph

      - name: Test lib/work-graph
        run: npm test -w @rad-orchestration/work-graph

  adapters:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install adapter engine dependencies (yaml)
        working-directory: harness-adapters/engine
        run: npm install

      - name: Adapter unit tests (each capability surface)
        run: node --test harness-adapters/engine/__tests__/*.test.mjs

      - name: Install shared build-helpers dependencies (esbuild)
        working-directory: harness-installers/shared/build-helpers
        run: npm install

      - name: Smoke build all harnesses against canonical source
        run: node harness-dogfood/build.js --all
