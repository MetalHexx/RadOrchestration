# .github/workflows/ci.yml — Run every adapter + integration tests on every PR.

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  adapters:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Adapter unit tests (each capability surface)
        run: node --test adapters/*.test.js adapters/*/adapter.test.js

      - name: Adapter integration test (well-formed manifest per harness)
        run: node --test scripts/build-integration.test.js

      - name: Install pipeline scripts dependencies (for npm run bundle)
        working-directory: skills/rad-orchestration/scripts
        run: npm install

      - name: Smoke build all harnesses against canonical source
        run: node scripts/build.js --all

  bundles:
    # Materializes both distribution artifacts (legacy installer bundles and
    # the staged Claude plugin tree) and runs the bundle invariant suite:
    # plugin-only skill placement, bundle completeness, manifest coherence,
    # and the plugin tarball size budget.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Install ordering mirrors publish.yml's `publish-plugin` job: cli/,
      # ui/, skills/rad-orchestration/scripts/ all need their deps before
      # build:plugin (and sync-source.js, which also re-emits the pipeline
      # bundle via skills/rad-orchestration/scripts/'s esbuild).
      - name: Install cli dependencies
        working-directory: cli
        run: npm ci

      - name: Install ui dependencies
        working-directory: ui
        run: npm ci

      - name: Install pipeline scripts dependencies
        working-directory: skills/rad-orchestration/scripts
        run: npm install

      - name: Stage legacy installer bundles
        run: node installer/scripts/sync-source.js

      - name: Stage Claude plugin tree
        run: npm run build:plugin

      - name: Bundle invariants — placement, completeness, manifest, size
        run: |
          node --test \
            tests/scripts/plugin-only-skill-placement.test.mjs \
            tests/scripts/bundle-completeness.test.mjs \
            tests/scripts/manifest-coherence.test.mjs \
            tests/scripts/plugin-tarball-size.test.mjs
