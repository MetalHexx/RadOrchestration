# .github/workflows/ci.yml — Run every adapter + integration tests on every PR.

name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  adapters:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Adapter unit tests (each capability surface)
        run: node --test harness-adapters/engine/__tests__/*.test.mjs

      - name: Install pipeline scripts dependencies (for npm run bundle)
        working-directory: harness-files/skills/rad-orchestration/scripts
        run: npm install

      - name: Smoke build all harnesses against canonical source
        run: node harness-dogfood/build.js --all
