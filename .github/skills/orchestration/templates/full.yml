name: full
description: >-
  Full pipeline template — lossless replication of the orchestration pipeline.
  Includes all planning steps, design, code review, source control commits,
  phase reports, phase review, final review, and PR creation.

nodes:
  # ── Planning Steps ───────────────────────────────────────────────────────
  - id: research
    type: step
    action: spawn_research
    events:
      started: research_started
      completed: research_completed
    planning_step: research

  - id: create_prd
    type: step
    depends_on:
      - research
    action: spawn_prd
    events:
      started: prd_started
      completed: prd_completed
    planning_step: prd

  - id: create_design
    type: step
    depends_on:
      - create_prd
    action: spawn_design
    events:
      started: design_started
      completed: design_completed
    planning_step: design

  - id: create_architecture
    type: step
    depends_on:
      - create_design
    action: spawn_architecture
    events:
      started: architecture_started
      completed: architecture_completed
    planning_step: architecture

  - id: create_master_plan
    type: step
    depends_on:
      - create_architecture
    action: spawn_master_plan
    events:
      started: master_plan_started
      completed: master_plan_completed
    planning_step: master_plan

  # ── Planning Gate ────────────────────────────────────────────────────────
  - id: request_plan_approval
    type: gate
    depends_on:
      - create_master_plan
    gate_type: planning
    gate_action: request_plan_approval

  # ── Phase Loop ───────────────────────────────────────────────────────────
  - id: for_each_phase
    type: for_each_phase
    depends_on:
      - request_plan_approval
    body:
      - id: create_phase_plan
        type: step
        action: create_phase_plan
        events:
          started: phase_planning_started
          completed: phase_plan_created

      - id: for_each_task
        type: for_each_task
        depends_on:
          - create_phase_plan
        body:
          - id: create_task_handoff
            type: step
            action: create_task_handoff
            events:
              started: task_handoff_started
              completed: task_handoff_created

          - id: execute_coding_task
            type: step
            depends_on:
              - create_task_handoff
            action: execute_task
            events:
              completed: task_completed

          - id: code_review
            type: step
            depends_on:
              - execute_coding_task
            action: spawn_code_reviewer
            events:
              completed: code_review_completed

          - id: source_control_commit
            type: step
            depends_on:
              - code_review
            action: invoke_source_control_commit
            events:
              completed: task_committed

      - id: generate_phase_report
        type: step
        depends_on:
          - for_each_task
        action: generate_phase_report
        events:
          completed: phase_report_created

      - id: phase_review
        type: step
        depends_on:
          - generate_phase_report
        action: spawn_phase_reviewer
        events:
          completed: phase_review_completed

  # ── Final Review ─────────────────────────────────────────────────────────
  - id: create_final_review
    type: step
    depends_on:
      - for_each_phase
    action: spawn_final_reviewer
    events:
      completed: final_review_completed

  - id: invoke_source_control_pr
    type: step
    depends_on:
      - create_final_review
    action: invoke_source_control_pr
    events:
      completed: pr_created

  - id: request_final_approval
    type: gate
    depends_on:
      - invoke_source_control_pr
    gate_type: final
    gate_action: request_final_approval
