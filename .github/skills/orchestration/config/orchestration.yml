# .github/orchestration.yml
# Orchestration System Configuration
# -----------------------------------

version: "5.0"

# ─── System ────────────────────────────────────────────────────────
system:
  orch_root: ".github"                   # Orchestration root folder (relative name or absolute path)

# ─── Project Storage ───────────────────────────────────────────────
projects:
  # base_path accepts both relative paths (resolved from workspace root)
  # and absolute paths (e.g., /shared/projects for git worktree setups).
  base_path: "C:\\dev\\orchestration-projects"          # Where project folders are created
  naming: "SCREAMING_CASE"               # SCREAMING_CASE | lowercase | numbered

# ─── Pipeline Limits (Scope Guards) ───────────────────────────────
limits:
  max_phases: 10                         # Maximum phases per project
  max_tasks_per_phase: 8                 # Maximum tasks per phase
  max_retries_per_task: 2                # Auto-retries before escalation
  max_consecutive_review_rejections: 3   # Reviewer rejects before human escalation

# ─── Human Gate Defaults ───────────────────────────────────────────
human_gates:
  after_planning: true                   # Always gate after master plan (hard default)
  execution_mode: "ask"                  # ask | phase | task | autonomous
  after_final_review: true               # Always gate after final review (hard default)


# ─── Source Control ────────────────────────────────────────────────
source_control:
  isolation_mode: "worktree"             # worktree | branch | none
  activation: "ask"                      # always | never | ask
  branch_from: "ask"                     # default | current | ask
  worktree_path: "../v3-worktrees"       # Relative (from repo root) or absolute path
  branch_prefix: "project/"              # Branch naming prefix (e.g., project/MY-PROJECT)
  cleanup: "ask"                         # ask | on_completion | manual
  

# ─── Notes ─────────────────────────────────────────────────────────
# Model selection is configured per-agent in .agent.md frontmatter.
# See .github/agents/*.agent.md → `model` field.
